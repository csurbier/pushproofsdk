# Build JitPack de la lib native Android (module :android).
# Coordonnée publiée : com.github.csurbier.pushproofsdk:android:<tag>
#
# Le Gradle wrapper (gradle/wrapper/, gradlew) épingle Gradle 8.7, compatible
# AGP 8.2. Sans wrapper, JitPack retombe sur un Gradle système trop ancien
# (4.8.1) → build cassé. On force donc ./gradlew.
jdk:
  - openjdk17
install:
  - ./gradlew --no-daemon :android:publishToMavenLocal
